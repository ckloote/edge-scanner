# Hand-curated cross-venue event links (design doc §4, §7 phase 3).
#
# CONFIG, not data: edited by hand, version-controlled. Each pair was verified
# equivalent on 2026-06-16 (same underlying question, same resolution event/date).
#
# Polarity convention (fixed for the whole set): leg A = Kalshi buy YES,
# leg B = Polymarket buy NO. At resolution exactly one leg pays $1, so the pair
# costs kalshi_yes_ask + poly_no_ask and the edge is 1 - that (design doc §6).
# This is just an ENCODING convention: each cycle the daemon also evaluates the
# complement direction (Kalshi buy NO + Polymarket buy YES), persists whichever
# nets higher in the main edge_snapshot columns, and records the loser in
# mirror_net_edge / mirror_executable_size. No reverse links needed.
#
# Bias toward NEAR-DATED events (smallest lockup): the Fed July meeting (~6 weeks)
# and the World Cup final (~5 weeks) anchor the set.

events:
  # ----- Fed July 2026 FOMC (resolves 2026-07-29) ------------------------
  # Kalshi KXFEDDECISION-26JUL-* YES == Polymarket same-outcome NO.
  - event_id: fed-jul-hold
    note: "Fed maintains rate in July 2026. Kalshi 'Fed maintains rate' == PM 'No change'."
    resolution_check: confirmed-equivalent
    legs:
      - {venue: kalshi, venue_market_id: KXFEDDECISION-26JUL-H0, buy_outcome: "YES"}
      - {venue: polymarket, venue_market_id: "0x8bf1c1536ecb1c08fe13c6b71e8ab1f58bf3461c4cb79f5f1679f869a06aef86", buy_outcome: "NO"}
  - event_id: fed-jul-cut25
    note: "Fed cuts 25bps in July 2026. Kalshi 'Cut 25bps' == PM '25 bps decrease'."
    resolution_check: confirmed-equivalent
    legs:
      - {venue: kalshi, venue_market_id: KXFEDDECISION-26JUL-C25, buy_outcome: "YES"}
      - {venue: polymarket, venue_market_id: "0x4ede078cae84a5877ac32d7fb48811e5c23549a1904b7df06ff7935c6d79d831", buy_outcome: "NO"}
  - event_id: fed-jul-hike25
    note: "Fed hikes 25bps in July 2026. Kalshi 'Hike 25bps' == PM '25 bps increase'."
    resolution_check: confirmed-equivalent
    legs:
      - {venue: kalshi, venue_market_id: KXFEDDECISION-26JUL-H25, buy_outcome: "YES"}
      - {venue: polymarket, venue_market_id: "0xb5c0abeecb5502e6e8d83155c27819174d8317af3c425c3afc5a8c45257a3793", buy_outcome: "NO"}

